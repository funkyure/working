<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESG 工作戰情中心 | 上海商業儲蓄銀行</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0b0f1a;
  --bg2: #111827;
  --bg3: #1a2235;
  --bg4: #1e2d45;
  --border: rgba(99,144,220,0.15);
  --border2: rgba(99,144,220,0.28);
  --text: #e8edf5;
  --text2: #8fa3be;
  --text3: #5a7294;
  --accent: #3b7dd8;
  --accent2: #5b9af0;
  --red: #e05252;
  --red-bg: rgba(224,82,82,0.12);
  --yellow: #f0b429;
  --yellow-bg: rgba(240,180,41,0.12);
  --green: #3dc97e;
  --green-bg: rgba(61,201,126,0.12);
  --blue: #4ba3d9;
  --blue-bg: rgba(75,163,217,0.12);
  --gray: #6b7ea0;
  --gray-bg: rgba(107,126,160,0.12);
  --font: 'Noto Sans TC', sans-serif;
  --mono: 'JetBrains Mono', monospace;
  --radius: 10px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
}
body.light {
  --bg: #f0f4fa;
  --bg2: #ffffff;
  --bg3: #e8eef8;
  --bg4: #d8e4f4;
  --border: rgba(59,125,216,0.15);
  --border2: rgba(59,125,216,0.3);
  --text: #1a2a3f;
  --text2: #3f5a80;
  --text3: #8aa0be;
  --accent: #2563eb;
  --accent2: #3b7dd8;
  --shadow: 0 4px 24px rgba(59,125,216,0.1);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; transition: background 0.3s, color 0.3s; }

/* HEADER */
.header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  display: flex; align-items: center; gap: 16px;
  height: 56px; position: sticky; top: 0; z-index: 100;
  box-shadow: var(--shadow);
}
.header-logo {
  font-size: 13px; font-weight: 700; letter-spacing: 1px;
  color: var(--accent2); text-transform: uppercase;
  white-space: nowrap;
}
.header-title {
  font-size: 15px; font-weight: 500; color: var(--text);
  border-left: 1px solid var(--border2); padding-left: 16px;
}
.header-spacer { flex: 1; }
.search-box {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 20px; padding: 6px 14px; width: 240px;
  transition: border-color 0.2s;
}
.search-box:focus-within { border-color: var(--accent); }
.search-box input {
  background: none; border: none; outline: none;
  color: var(--text); font-family: var(--font); font-size: 13px; width: 100%;
}
.search-box input::placeholder { color: var(--text3); }
.search-icon { color: var(--text3); font-size: 14px; }
.header-btn {
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--text2); border-radius: 8px; padding: 6px 12px;
  cursor: pointer; font-size: 12px; font-family: var(--font);
  transition: all 0.2s; white-space: nowrap;
}
.header-btn:hover { border-color: var(--accent); color: var(--accent2); }
.last-update { font-size: 11px; color: var(--text3); white-space: nowrap; }

/* FILTERS */
.filter-bar {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 8px 20px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
}
.filter-label { font-size: 11px; color: var(--text3); margin-right: 4px; }
.filter-chip {
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--text2); border-radius: 14px; padding: 4px 12px;
  cursor: pointer; font-size: 12px; font-family: var(--font);
  transition: all 0.2s;
}
.filter-chip:hover, .filter-chip.active { border-color: var(--accent); color: var(--accent2); background: rgba(59,125,216,0.12); }
.filter-sep { color: var(--border2); margin: 0 4px; }

/* MAIN LAYOUT */
.main { padding: 16px 20px; max-width: 1600px; margin: 0 auto; }

/* ZONE 1: TODAY STATS */
.zone-title {
  font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--text3); margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
}
.zone-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.stats-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 20px; }
.stat-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px;
  transition: border-color 0.2s, transform 0.2s;
}
.stat-card:hover { border-color: var(--border2); transform: translateY(-1px); }
.stat-card.urgent { border-left: 3px solid var(--red); }
.stat-card.warning { border-left: 3px solid var(--yellow); }
.stat-card.info { border-left: 3px solid var(--accent); }
.stat-card.success { border-left: 3px solid var(--green); }
.stat-value { font-size: 28px; font-weight: 700; font-family: var(--mono); line-height: 1; }
.stat-value.red { color: var(--red); }
.stat-value.yellow { color: var(--yellow); }
.stat-value.blue { color: var(--accent2); }
.stat-value.green { color: var(--green); }
.stat-label { font-size: 11px; color: var(--text3); margin-top: 4px; }
.stat-items { font-size: 11px; color: var(--text2); margin-top: 6px; }
.stat-items a { color: var(--accent2); text-decoration: none; }
.stat-items a:hover { text-decoration: underline; }

/* ZONE 2: KANBAN */
.kanban { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 20px; }
@media (max-width: 1100px) { .kanban { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 700px) { .kanban { grid-template-columns: 1fr 1fr; } }
@media (max-width: 480px) { .kanban { grid-template-columns: 1fr; } }
.kanban-col {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden; min-height: 200px;
}
.kanban-header {
  padding: 10px 14px; display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border); position: sticky; top: 56px;
  background: var(--bg2); z-index: 10;
}
.kanban-header-title { font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
.kanban-count {
  font-size: 10px; font-family: var(--mono); font-weight: 600;
  background: var(--bg3); border-radius: 10px; padding: 2px 8px; color: var(--text3);
}
.kanban-body { padding: 10px; display: flex; flex-direction: column; gap: 8px; }
/* Cards */
.task-card {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 12px; cursor: pointer;
  transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
  position: relative;
}
.task-card:hover { border-color: var(--border2); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.3); }
.task-card.overdue { border-left: 3px solid var(--red); }
.task-card.due-soon { border-left: 3px solid var(--yellow); }
.card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 6px; margin-bottom: 6px; }
.card-name { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.3; }
.card-pri { font-size: 10px; font-weight: 700; font-family: var(--mono); border-radius: 4px; padding: 2px 6px; white-space: nowrap; }
.pri-p0 { background: rgba(224,82,82,0.2); color: var(--red); }
.pri-p1 { background: rgba(240,180,41,0.15); color: var(--yellow); }
.pri-p2 { background: rgba(75,163,217,0.15); color: var(--blue); }
.card-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
.card-cat { font-size: 10px; color: var(--text3); background: var(--bg4); border-radius: 4px; padding: 2px 7px; }
.card-unit { font-size: 10px; color: var(--text3); }
.card-due { font-size: 11px; font-family: var(--mono); }
.card-due.overdue { color: var(--red); }
.card-due.soon { color: var(--yellow); }
.card-due.normal { color: var(--text3); }
.progress-bar { height: 4px; background: var(--bg4); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }
.progress-fill.p0-fill { background: var(--red); }
.progress-fill.p1-fill { background: var(--yellow); }
.progress-fill.p2-fill { background: var(--accent); }
.progress-fill.done-fill { background: var(--green); }
.card-progress-label { font-size: 10px; color: var(--text3); margin-top: 3px; text-align: right; font-family: var(--mono); }
/* Expand */
.card-expand { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
.card-expand.open { display: block; }
.card-note { font-size: 12px; color: var(--text2); margin-bottom: 6px; line-height: 1.5; }
.card-link a { font-size: 11px; color: var(--accent2); text-decoration: none; }
.card-link a:hover { text-decoration: underline; }
.card-id { font-size: 10px; color: var(--text3); font-family: var(--mono); margin-top: 6px; }
.card-assignee { font-size: 11px; color: var(--text2); }

/* ZONE 3: GANTT */
.gantt-wrap {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden; margin-bottom: 20px;
}
.gantt-inner { overflow-x: auto; }
.gantt-grid { display: grid; }
.gantt-row { display: flex; align-items: center; border-bottom: 1px solid var(--border); min-height: 32px; }
.gantt-row:last-child { border-bottom: none; }
.gantt-label { width: 200px; min-width: 200px; padding: 4px 12px; font-size: 11px; color: var(--text2); border-right: 1px solid var(--border); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.gantt-timeline { position: relative; flex: 1; height: 32px; }
.gantt-bar {
  position: absolute; top: 6px; height: 20px; border-radius: 4px;
  opacity: 0.85; display: flex; align-items: center; padding: 0 6px;
  font-size: 10px; font-family: var(--mono); white-space: nowrap; overflow: hidden;
  transition: opacity 0.2s;
}
.gantt-bar:hover { opacity: 1; }
.gantt-bar.status-red { background: rgba(224,82,82,0.3); border-left: 2px solid var(--red); color: var(--red); }
.gantt-bar.status-yellow { background: rgba(240,180,41,0.25); border-left: 2px solid var(--yellow); color: var(--yellow); }
.gantt-bar.status-green { background: rgba(75,163,217,0.2); border-left: 2px solid var(--blue); color: var(--blue); }
.gantt-bar.status-done { background: rgba(107,126,160,0.15); border-left: 2px solid var(--gray); color: var(--gray); }
.gantt-header-row { display: flex; background: var(--bg3); border-bottom: 1px solid var(--border); }
.gantt-header-label { width: 200px; min-width: 200px; padding: 6px 12px; font-size: 10px; color: var(--text3); border-right: 1px solid var(--border); }
.gantt-header-dates { flex: 1; position: relative; height: 28px; }
.gantt-date-tick { position: absolute; font-size: 9px; font-family: var(--mono); color: var(--text3); transform: translateX(-50%); top: 6px; white-space: nowrap; }
.gantt-today-line { position: absolute; top: 0; bottom: 0; width: 1px; background: var(--red); opacity: 0.5; z-index: 5; }
.gantt-today-label { position: absolute; top: 2px; font-size: 9px; color: var(--red); transform: translateX(-50%); white-space: nowrap; }

/* ZONE 4: CHARTS */
.charts-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 20px; }
@media (max-width: 900px) { .charts-row { grid-template-columns: 1fr 1fr; } }
@media (max-width: 600px) { .charts-row { grid-template-columns: 1fr; } }
.chart-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px; overflow: hidden;
}
.chart-title { font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 14px; }
.pie-wrap { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
.pie-legend { display: flex; flex-direction: column; gap: 6px; flex: 1; }
.pie-legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text2); }
.pie-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.bar-chart { display: flex; flex-direction: column; gap: 6px; }
.bar-row { display: flex; align-items: center; gap: 8px; }
.bar-label { font-size: 11px; color: var(--text2); width: 70px; flex-shrink: 0; text-align: right; }
.bar-track { flex: 1; height: 8px; background: var(--bg3); border-radius: 4px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
.bar-val { font-size: 11px; color: var(--text3); font-family: var(--mono); width: 28px; text-align: right; }
.mini-line { display: flex; flex-direction: column; gap: 4px; }
.mini-line-row { display: flex; align-items: center; gap: 8px; }
.mini-line-month { font-size: 10px; color: var(--text3); font-family: var(--mono); width: 40px; }
.mini-line-bar { flex: 1; height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
.mini-line-fill { height: 100%; border-radius: 3px; background: var(--red); }
.mini-line-val { font-size: 10px; color: var(--text3); font-family: var(--mono); width: 16px; text-align: right; }
/* SVG pie */
svg.pie { overflow: visible; }

/* Status colors */
.col-red .kanban-header-title { color: var(--red); }
.col-yellow .kanban-header-title { color: var(--yellow); }
.col-green .kanban-header-title { color: var(--green); }
.col-blue .kanban-header-title { color: var(--blue); }
.col-gray .kanban-header-title { color: var(--gray); }

/* Loading & Error */
.loading { text-align: center; padding: 60px; color: var(--text3); }
.spinner { display: inline-block; width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
.error-box { background: var(--red-bg); border: 1px solid rgba(224,82,82,0.3); border-radius: var(--radius); padding: 16px; margin: 16px 0; color: var(--red); }
.demo-notice {
  background: rgba(59,125,216,0.08); border: 1px solid rgba(59,125,216,0.25);
  border-radius: var(--radius); padding: 10px 16px; margin-bottom: 16px;
  font-size: 12px; color: var(--text2); display: flex; align-items: center; gap: 8px;
}

/* Misc */
.section { margin-bottom: 24px; }
.no-items { text-align: center; padding: 24px; font-size: 12px; color: var(--text3); }
.hidden { display: none !important; }
a { color: var(--accent2); }

/* Mobile adjustments */
@media (max-width: 600px) {
  .header { padding: 0 12px; gap: 8px; }
  .header-title { display: none; }
  .search-box { width: 140px; }
  .main { padding: 10px 12px; }
  .gantt-label { width: 120px; min-width: 120px; }
  .gantt-header-label { width: 120px; min-width: 120px; }
  .stats-row { grid-template-columns: 1fr 1fr; }
}

/* Scrollbar */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text3); }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-logo">SCSB</div>
  <div class="header-title">ESG 工作戰情中心</div>
  <div class="header-spacer"></div>
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="搜尋項目、備註、類別…" oninput="applyFilters()">
  </div>
  <button class="header-btn" onclick="toggleSort()">排序: <span id="sortLabel">到期日</span></button>
  <button class="header-btn" onclick="toggleTheme()">🌙 夜間模式</button>
  <div class="last-update" id="lastUpdate">載入中…</div>
</div>

<!-- FILTER BAR -->
<div class="filter-bar">
  <span class="filter-label">類別</span>
  <button class="filter-chip active" data-filter="cat" data-val="">全部</button>
  <button class="filter-chip" data-filter="cat" data-val="查資料">查資料</button>
  <button class="filter-chip" data-filter="cat" data-val="翻譯">翻譯</button>
  <button class="filter-chip" data-filter="cat" data-val="信件">信件</button>
  <button class="filter-chip" data-filter="cat" data-val="追蹤">追蹤</button>
  <button class="filter-chip" data-filter="cat" data-val="會議">會議</button>
  <button class="filter-chip" data-filter="cat" data-val="報告">報告</button>
  <span class="filter-sep">|</span>
  <span class="filter-label">關聯單位</span>
  <button class="filter-chip active" data-filter="unit" data-val="">全部</button>
  <button class="filter-chip" data-filter="unit" data-val="金管會">金管會</button>
  <button class="filter-chip" data-filter="unit" data-val="董事會">董事會</button>
  <button class="filter-chip" data-filter="unit" data-val="風控部">風控部</button>
  <button class="filter-chip" data-filter="unit" data-val="業務部">業務部</button>
  <span class="filter-sep">|</span>
  <span class="filter-label">優先級</span>
  <button class="filter-chip active" data-filter="pri" data-val="">全部</button>
  <button class="filter-chip" data-filter="pri" data-val="P0">P0</button>
  <button class="filter-chip" data-filter="pri" data-val="P1">P1</button>
  <button class="filter-chip" data-filter="pri" data-val="P2">P2</button>
</div>

<!-- MAIN -->
<div class="main">

  <!-- DEMO NOTICE -->
  <div class="demo-notice" id="demoNotice">
    📊 目前顯示範例資料。請在下方 CONFIG 設定您的 Google Sheets ID，重新整理後即載入真實資料。
    <button class="header-btn" onclick="document.getElementById('configPanel').classList.toggle('hidden')" style="margin-left:auto">⚙️ 設定</button>
  </div>

  <!-- CONFIG PANEL -->
  <div id="configPanel" class="hidden" style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px;">
    <div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:10px;">資料來源設定</div>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
      <label style="font-size:12px;color:var(--text3);">Spreadsheet ID：</label>
      <input type="text" id="sheetIdInput" placeholder="貼上您的 Google Sheets ID" style="flex:1;min-width:200px;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:6px 10px;font-family:var(--mono);font-size:12px;">
      <button class="header-btn" onclick="saveConfig()">儲存並重新載入</button>
    </div>
    <div style="font-size:11px;color:var(--text3);margin-top:8px;">
      在 Google Sheets → 檔案 → 共用 → 發布到網路 → 選擇 ESG_Work 工作表 → CSV 格式 → 發布。<br>
      Sheets URL 中 /d/ 和 /edit 之間的字串即為 ID。
    </div>
  </div>

  <!-- ZONE 1 -->
  <div class="section">
    <div class="zone-title">今日戰情</div>
    <div class="stats-row" id="statsRow">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </div>

  <!-- ZONE 2 -->
  <div class="section">
    <div class="zone-title">任務看板</div>
    <div class="kanban" id="kanbanBoard">
      <div class="loading" style="grid-column:1/-1"><div class="spinner"></div></div>
    </div>
  </div>

  <!-- ZONE 3 -->
  <div class="section">
    <div class="zone-title">時間軸（前後 30 天）</div>
    <div class="gantt-wrap">
      <div class="gantt-inner">
        <div id="ganttContainer"></div>
      </div>
    </div>
  </div>

  <!-- ZONE 4 -->
  <div class="section">
    <div class="zone-title">統計分析</div>
    <div class="charts-row" id="chartsRow">
      <div class="loading" style="grid-column:1/-1"><div class="spinner"></div></div>
    </div>
  </div>

</div>

<script>
// ============================================================
// CONFIG — 修改這裡的 SHEET_ID 即可連結您的 Google Sheets
// ============================================================
let SHEET_ID = localStorage.getItem('esg_sheet_id') || '';
const SHEET_NAME = 'ESG_Work';

// Sort state
let currentSort = 'due';
let filterCat = '', filterUnit = '', filterPri = '';
let allTasks = [];

// ============================================================
// DEMO DATA (10 items)
// ============================================================

// ============================================================
// UTILS
// ============================================================
function today() { return new Date().toISOString().slice(0,10); }
function daysDiff(dateStr) {
  const d = new Date(dateStr), t = new Date(today());
  return Math.floor((d-t)/(1000*60*60*24));
}
function formatDate(s) {
  if (!s) return '';
  const d = new Date(s);
  return `${d.getMonth()+1}/${d.getDate()}`;
}
function statusEmoji(s) {
  if (s.includes('緊急')) return '🔴';
  if (s.includes('進行')) return '🟡';
  if (s.includes('待處理')) return '🟢';
  if (s.includes('已完成')) return '⚪️';
  if (s.includes('排程')) return '🔵';
  return '';
}
function priorityClass(p) {
  if (p==='P0') return 'pri-p0';
  if (p==='P1') return 'pri-p1';
  return 'pri-p2';
}
function progressClass(pri, pct) {
  if (pct===100) return 'done-fill';
  if (pri==='P0') return 'p0-fill';
  if (pri==='P1') return 'p1-fill';
  return 'p2-fill';
}
function dueClass(due) {
  const d = daysDiff(due);
  if (d < 0) return 'overdue';
  if (d <= 7) return 'soon';
  return 'normal';
}
function dueLabel(due) {
  const d = daysDiff(due);
  if (!due) return '';
  if (d < 0) return `逾期 ${-d}天`;
  if (d === 0) return '今天到期';
  if (d === 1) return '明天到期';
  if (d <= 7) return `${d}天後`;
  return formatDate(due);
}

// ============================================================
// DATA LOADING
// ============================================================
async function loadData() {
  if (!SHEET_ID) {
    useDemoData();
    return;
  }
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME)}&t=${Date.now()}`;
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const csv = await res.text();
    const rows = parseCSV(csv);
    if (rows.length < 2) { useDemoData(); return; }
    allTasks = rows.slice(1).map(r => ({
      id: r[0]||'', name: r[1]||'', cat: r[2]||'', subcat: r[3]||'',
      status: r[4]||'', pri: r[5]||'P2', start: r[6]||'', due: r[7]||'',
      pct: parseInt(r[8])||0, assignee: r[9]||'', unit: r[10]||'',
      link: r[11]||'', note: r[12]||'', updated: r[13]||''
    })).filter(t => t.id);
    document.getElementById('demoNotice').classList.add('hidden');
    document.getElementById('lastUpdate').textContent = '更新: ' + new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
    renderAll();
  } catch(e) {
    console.error(e);
    useDemoData();
  }
}

function useDemoData() {
  allTasks = DEMO_DATA;
  document.getElementById('lastUpdate').textContent = '範例資料';
  renderAll();
}

function parseCSV(text) {
  const rows = []; let row = [], cur = '', inQ = false;
  for (let i=0; i<text.length; i++) {
    const c = text[i];
    if (c==='"') { inQ=!inQ; }
    else if (c===',' && !inQ) { row.push(cur.trim()); cur=''; }
    else if ((c==='\n'||c==='\r') && !inQ) {
      if (cur||row.length) { row.push(cur.trim()); rows.push(row); }
      row=[]; cur='';
      if (c==='\r' && text[i+1]==='\n') i++;
    } else cur += c;
  }
  if (cur||row.length) { row.push(cur.trim()); rows.push(row); }
  return rows;
}

// ============================================================
function getFiltered() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  return allTasks.filter(t => {
    if (filterCat && t.cat !== filterCat) return false;
    if (filterUnit && !t.unit.includes(filterUnit)) return false;
    if (filterPri && t.pri !== filterPri) return false;
    if (q && !`${t.name} ${t.note} ${t.cat} ${t.subcat}`.toLowerCase().includes(q)) return false;
    return true;
  });
}

function applyFilters() { renderAll(); }

// Filter chips
document.querySelectorAll('.filter-chip').forEach(btn => {
  btn.addEventListener('click', function() {
    const f = this.dataset.filter, v = this.dataset.val;
    document.querySelectorAll(`.filter-chip[data-filter="${f}"]`).forEach(b=>b.classList.remove('active'));
    this.classList.add('active');
    if (f==='cat') filterCat=v;
    if (f==='unit') filterUnit=v;
    if (f==='pri') filterPri=v;
    applyFilters();
  });
});

function toggleSort() {
  const sorts = ['due','pri','start'];
  const labels = {'due':'到期日','pri':'優先級','start':'開始日'};
  const idx = sorts.indexOf(currentSort);
  currentSort = sorts[(idx+1)%sorts.length];
  document.getElementById('sortLabel').textContent = labels[currentSort];
  applyFilters();

function sortTasks(tasks) {
  return [...tasks].sort((a,b)=>{
    if (currentSort==='due') return (a.due||'9999')>(b.due||'9999')?1:-1;
    if (currentSort==='pri') return (a.pri>b.pri)?1:-1;
    if (currentSort==='start') return (a.start||'')>(b.start||'')?1:-1;
    return 0;
  });
}

  const html = `
    <div class="stat-card urgent">
      <div class="stat-value red">${todayDue.length + overdue.length}</div>
      <div class="stat-label">🔴 今日到期 + 逾期</div>
      <div class="stat-items">${[...overdue,...todayDue].slice(0,3).map(x=>`<span style="color:var(--red)">${x.name.slice(0,12)}…</span>`).join('<br>') || '無'}</div>
    </div>
    <div class="stat-card warning">
      <div class="stat-value yellow">${weekDue.length}</div>
      <div class="stat-label">🟡 本週即將到期</div>
      <div class="stat-items">${weekDue.slice(0,3).map(x=>`${x.name.slice(0,12)}… (${dueLabel(x.due)})`).join('<br>') || '無'}</div>
    </div>
    <div class="stat-card info">
      <div class="stat-value blue">${inprog.length}</div>
      <div class="stat-label">進行中項目</div>
      <div class="stat-items">P0: ${inprog.filter(x=>x.pri==='P0').length} &nbsp;P1: ${inprog.filter(x=>x.pri==='P1').length} &nbsp;P2: ${inprog.filter(x=>x.pri==='P2').length}</div>
    </div>
    <div class="stat-card success">
      <div class="stat-value green">${done.length}</div>
      <div class="stat-label">已完成項目</div>
      <div class="stat-items">完成率 ${tasks.length ? Math.round(done.length/tasks.length*100) : 0}%</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" style="color:var(--text2)">${tasks.length}</div>
      <div class="stat-label">篩選後總項目</div>
      <div class="stat-items">${[...new Set(tasks.map(x=>x.cat))].join(' · ') || '—'}</div>

// ZONE 2: KANBAN
// ============================================================
const COLS = [
  { key:'urgent', label:'🔴 緊急', cls:'col-red', filter: t => t.status.includes('緊急') || (daysDiff(t.due)<0 && t.status!=='⚪️已完成') },
  { key:'inprog', label:'🟡 進行中', cls:'col-yellow', filter: t => t.status.includes('進行') && daysDiff(t.due)>=0 },
  { key:'todo', label:'🟢 待處理', cls:'col-green', filter: t => t.status.includes('待處理') },
  { key:'sched', label:'🔵 排程中', cls:'col-blue', filter: t => t.status.includes('排程') },
  { key:'done', label:'⚪️ 已完成', cls:'col-gray', filter: t => t.status.includes('已完成') },
];

function renderKanban(tasks) {
  const html = COLS.map(col => {
    const items = tasks.filter(col.filter);
    const cards = items.map(t => {
      const dc = dueClass(t.due);
      const cardCls = dc==='overdue'?'overdue':dc==='soon'?'due-soon':'';
      return `
        <div class="task-card ${cardCls}" onclick="toggleCard(this)">
          <div class="card-top">
            <div class="card-name">${esc(t.name)}</div>
            <span class="card-pri ${priorityClass(t.pri)}">${t.pri}</span>
          </div>
          <div class="card-meta">
            <span class="card-cat">${esc(t.cat)}</span>
            ${t.unit ? `<span class="card-unit">${esc(t.unit)}</span>` : ''}
            ${t.due ? `<span class="card-due ${dc}">${dueLabel(t.due)}</span>` : ''}
          </div>
          <div class="progress-bar"><div class="progress-fill ${progressClass(t.pri,t.pct)}" style="width:${t.pct}%"></div></div>
          <div class="card-progress-label">${t.pct}%</div>
          <div class="card-expand">
            ${t.note ? `<div class="card-note">📝 ${esc(t.note)}</div>` : ''}
            ${t.link ? `<div class="card-link"><a href="${esc(t.link)}" target="_blank">🔗 文件連結</a></div>` : ''}
            <div class="card-assignee">👤 ${esc(t.assignee)} ${t.subcat?`· ${esc(t.subcat)}`:''}</div>
            <div class="card-id">${esc(t.id)} · 更新: ${esc(t.updated)}</div>
          </div>
        </div>`;
    }).join('') || '<div class="no-items">—</div>';
    return `
      <div class="kanban-col ${col.cls}">
        <div class="kanban-header">
          <div class="kanban-header-title">${col.label}</div>
          <span class="kanban-count">${items.length}</span>
        </div>
        <div class="kanban-body">${cards}</div>
      </div>`;
  }).join('');
  document.getElementById('kanbanBoard').innerHTML = html;
}

function toggleCard(el) {
  const exp = el.querySelector('.card-expand');
  exp.classList.toggle('open');
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ZONE 3: GANTT
// ============================================================
function renderGantt(tasks) {
  const t0 = new Date(); t0.setDate(t0.getDate()-30);
  const t1 = new Date(); t1.setDate(t1.getDate()+30);
  const totalDays = 60;
  const todayOffset = 30;
  const colW = 14; // px per day => 60*14=840px

  const activeTasks = tasks.filter(t => t.status !== '⚪️已完成' && t.start && t.due);

  // Header dates
  let dateHtml = '';
  for (let i=0; i<=60; i+=5) {
    const d = new Date(t0); d.setDate(d.getDate()+i);
    const pct = (i/60)*100;
    dateHtml += `<div class="gantt-date-tick" style="left:${pct}%">${(d.getMonth()+1)}/${d.getDate()}</div>`;
  }
  const todayPct = (todayOffset/60)*100;
  dateHtml += `<div class="gantt-today-line" style="left:${todayPct}%"></div>`;
  dateHtml += `<div class="gantt-today-label" style="left:${todayPct}%">今天</div>`;

  const rows = activeTasks.slice(0,20).map(t => {
    const start = new Date(t.start), due = new Date(t.due);
    const s0 = Math.max(0, (start-t0)/(1000*60*60*24));
    const e0 = Math.min(60, (due-t0)/(1000*60*60*24));
    if (e0 < 0 || s0 > 60) return '';
    const left = (s0/60)*100;
    const width = Math.max(0.5, ((e0-s0)/60)*100);
    let barCls = 'status-yellow';
    if (t.status.includes('緊急') || daysDiff(t.due)<0) barCls='status-red';
    if (t.status.includes('待處理')||t.status.includes('排程')) barCls='status-green';
    return `
      <div class="gantt-row">
        <div class="gantt-label" title="${esc(t.name)}">${esc(t.name)}</div>
        <div class="gantt-timeline">
          <div class="gantt-today-line" style="left:${todayPct}%"></div>
          <div class="gantt-bar ${barCls}" style="left:${left}%;width:${width}%" title="${t.start} → ${t.due}">
            ${t.name.slice(0,8)}
          </div>
        </div>
      </div>`;
  }).join('');

  document.getElementById('ganttContainer').innerHTML = `
    <div class="gantt-header-row">
      <div class="gantt-header-label">項目</div>
      <div class="gantt-header-dates">${dateHtml}</div>
    </div>
    ${rows || '<div class="gantt-row"><div class="gantt-label" style="width:100%;border-right:none;color:var(--text3)">無活動項目</div></div>'}`;
}

// ZONE 4: CHARTS
// ============================================================
const CAT_COLORS = {
  '查資料':'#3b7dd8', '翻譯':'#f0b429', '信件':'#e05252',
  '追蹤':'#3dc97e', '會議':'#a78bfa', '報告':'#4ba3d9'
};

function renderCharts(tasks) {
  const active = tasks.filter(t => t.status !== '⚪️已完成');
  const done = tasks.filter(t => t.status === '⚪️已完成');

  // Pie: category distribution
  const catCount = {};
  tasks.forEach(t => { catCount[t.cat] = (catCount[t.cat]||0)+1; });
  const total = tasks.length || 1;
  let pieHtml = '<div class="pie-wrap">';
  pieHtml += buildPie(catCount, total);
  pieHtml += '<div class="pie-legend">';
  Object.entries(catCount).forEach(([k,v])=>{
    pieHtml += `<div class="pie-legend-item"><span class="pie-dot" style="background:${CAT_COLORS[k]||'#6b7ea0'}"></span>${k} (${v})</div>`;
  });
  pieHtml += '</div></div>';

  // Bar: in-progress by category
  const inCat = {};
  active.forEach(t => { inCat[t.cat] = (inCat[t.cat]||0)+1; });
  const maxBar = Math.max(...Object.values(inCat),1);
  let barHtml = '<div class="bar-chart">';
  Object.entries(inCat).sort((a,b)=>b[1]-a[1]).forEach(([k,v])=>{
    barHtml += `<div class="bar-row">
      <div class="bar-label">${k}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${(v/maxBar)*100}%;background:${CAT_COLORS[k]||'#6b7ea0'}"></div></div>
      <div class="bar-val">${v}</div>
    </div>`;
  });
  barHtml += '</div>';

  // Mini trend: overdue count (simulated for demo)
  const months = ['12月','1月','2月','3月','4月','5月'];
  const overdueVals = [2,3,1,4,2,tasks.filter(t=>daysDiff(t.due)<0 && t.status!=='⚪️已完成').length];
  const maxOd = Math.max(...overdueVals,1);
  let lineHtml = '<div class="mini-line">';
  months.forEach((m,i)=>{
    lineHtml += `<div class="mini-line-row">
      <div class="mini-line-month">${m}</div>
      <div class="mini-line-bar"><div class="mini-line-fill" style="width:${(overdueVals[i]/maxOd)*100}%"></div></div>
      <div class="mini-line-val">${overdueVals[i]}</div>
    </div>`;
  });
  lineHtml += '</div>';

  document.getElementById('chartsRow').innerHTML = `
    <div class="chart-card">
      <div class="chart-title">本月工作類別分布</div>
      ${pieHtml}
    </div>
    <div class="chart-card">
      <div class="chart-title">進行中項目（依類別）</div>
      ${barHtml || '<div style="color:var(--text3);font-size:12px">無資料</div>'}
    </div>
    <div class="chart-card">
      <div class="chart-title">逾期項目趨勢（近6月）</div>
      ${lineHtml}
    </div>`;
}

function buildPie(catCount, total) {
  const entries = Object.entries(catCount);
  const R = 50, cx = 60, cy = 60;
  let paths = '', angle = -Math.PI/2;
  entries.forEach(([k,v])=>{
    const a = (v/total) * Math.PI * 2;
    const x1 = cx + R*Math.cos(angle), y1 = cy + R*Math.sin(angle);
    const x2 = cx + R*Math.cos(angle+a), y2 = cy + R*Math.sin(angle+a);
    const large = a > Math.PI ? 1 : 0;
    const color = CAT_COLORS[k] || '#6b7ea0';
    paths += `<path d="M${cx},${cy} L${x1},${y1} A${R},${R} 0 ${large},1 ${x2},${y2} Z" fill="${color}" opacity="0.85"/>`;
    angle += a;
  });
  return `<svg class="pie" viewBox="0 0 120 120" width="100" height="100"><circle cx="60" cy="60" r="50" fill="var(--bg3)"/>${paths}</svg>`;
}
